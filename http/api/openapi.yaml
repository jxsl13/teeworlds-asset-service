openapi: "3.0.3"
info:
  title: Teeworlds Asset Database API
  version: "1.0.0"
  description: >
    REST API for the Teeworlds Asset Database — search, browse, upload
    and download community assets (skins, maps, gameskins & more).
  contact:
    name: Teeworlds Asset Database

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: search
    description: Search operations
  - name: storage
    description: File download and upload operations
  - name: ui
    description: HTMX-powered web frontend

paths:
  /:
    get:
      operationId: renderUI
      summary: Render the main UI page
      tags:
        - ui
      description: >
        Returns the full HTML page with embedded HTMX that serves as the
        web frontend. Also accessible via /index.html.
      responses:
        "200":
          description: Full HTML page.
          content:
            text/html:
              schema:
                type: string
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /{asset_type}:
    get:
      operationId: renderItemList
      summary: Render an HTML fragment listing items
      tags:
        - ui
      description: >
        Returns an HTML fragment for HTMX swap. When the query parameter q is
        provided the fragment shows fuzzy-search results, otherwise a
        paginated alphabetical listing.
      parameters:
        - name: asset_type
          in: path
          required: true
          description: The type of item to list.
          schema:
            $ref: "#/components/schemas/ItemType"
        - name: q
          in: query
          required: false
          description: Optional fuzzy search query.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Maximum number of results (default 100, max 1000).
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - name: offset
          in: query
          required: false
          description: Pagination offset (default 0).
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: sort
          in: query
          required: false
          description: >
            Comma-separated list of sort directives, each in the form
            "field:asc" or "field:desc". Supported fields are name and
            created_at. Example: "name:asc,created_at:desc".
          schema:
            type: string
        - name: creator
          in: query
          required: false
          description: Filter results to items with exactly this creator.
          schema:
            type: string
        - name: license
          in: query
          required: false
          description: Filter results to items with exactly this license.
          schema:
            type: string
        - name: date
          in: query
          required: false
          description: Filter results to items created on this date (YYYY-MM-DD).
          schema:
            type: string
      responses:
        "200":
          description: HTML fragment with items grid and pagination.
          content:
            text/html:
              schema:
                type: string
        "400":
          description: Bad request – invalid parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/config:
    get:
      operationId: getConfig
      summary: Get server configuration
      tags:
        - search
      description: >
        Returns public server configuration values such as pagination limits.
      responses:
        "200":
          description: Server configuration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigResponse"

  /api/item-types:
    get:
      operationId: listItemTypes
      summary: List all available item types
      tags:
        - search
      description: >
        Returns the complete list of item types defined by the database enum.
      responses:
        "200":
          description: List of item type strings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemTypesResponse"

  /api/search:
    get:
      operationId: searchItems
      summary: Search indexed items
      tags:
        - search
      description: >
        Returns a ranked list of items whose searchable values match the query
        string via pg_trgm strict word similarity.
      parameters:
        - name: q
          in: query
          required: true
          description: Search query string.
          schema:
            type: string
            minLength: 1
        - name: limit
          in: query
          required: false
          description: Maximum number of results to return (default 20, max 100).
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          required: false
          description: Number of results to skip for pagination (default 0).
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Ranked search results.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
        "400":
          description: Bad request – missing or invalid query parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/search/{asset_type}:
    get:
      operationId: searchItemsByType
      summary: Search items scoped to a single item type
      tags:
        - search
      description: >
        Returns a ranked list of items of the given type whose searchable
        values match the query string via pg_trgm strict word similarity.
      parameters:
        - name: asset_type
          in: path
          required: true
          description: The type of item to search within.
          schema:
            $ref: "#/components/schemas/ItemType"
        - name: q
          in: query
          required: true
          description: Search query string.
          schema:
            type: string
            minLength: 1
        - name: limit
          in: query
          required: false
          description: Maximum number of results to return (default 100, max 1000).
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - name: offset
          in: query
          required: false
          description: Number of results to skip for pagination (default 0).
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Ranked search results.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
        "400":
          description: Bad request – missing or invalid query parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/{asset_type}:
    get:
      operationId: listItems
      summary: List and filter items of a specific type
      tags:
        - search
      description: >
        Returns a paginated list of items for the given item type.
        Supports optional filtering by name, creator and license.
      parameters:
        - name: asset_type
          in: path
          required: true
          description: The type of item (lowercase).
          schema:
            $ref: "#/components/schemas/ItemType"
        - name: name
          in: query
          required: false
          description: Filter by item name (case-insensitive substring match).
          schema:
            type: string
        - name: creator
          in: query
          required: false
          description: Filter by creator name (case-insensitive substring match).
          schema:
            type: string
        - name: license
          in: query
          required: false
          description: Filter by exact license value.
          schema:
            $ref: "#/components/schemas/License"
        - name: sort
          in: query
          required: false
          description: Field to sort by (default "name").
          schema:
            $ref: "#/components/schemas/SortField"
        - name: order
          in: query
          required: false
          description: Sort direction (default "asc").
          schema:
            $ref: "#/components/schemas/SortOrder"
        - name: limit
          in: query
          required: false
          description: Maximum number of results to return (default 100, max 1000).
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - name: offset
          in: query
          required: false
          description: Number of results to skip for pagination (default 0).
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Paginated list of items.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListItemsResponse"
        "400":
          description: Bad request – invalid parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/{asset_type}/{item_id}/download:
    get:
      operationId: downloadItem
      summary: Download a stored item file
      tags:
        - storage
      description: >
        Streams the file for the given item from the configured storage path
        combined with the path stored in the database.
      parameters:
        - name: asset_type
          in: path
          required: true
          description: The type of item (lowercase).
          schema:
            $ref: "#/components/schemas/ItemType"
        - name: item_id
          in: path
          required: true
          description: Unique identifier of the item.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: File content.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Item not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/{asset_type}/{item_id}/thumbnail:
    get:
      operationId: downloadThumbnail
      summary: Download the thumbnail for an item
      tags:
        - storage
      description: >
        Streams the thumbnail image for the given item. Returns 404 if the
        item does not exist or has no thumbnail. Thumbnails are immutable,
        so the response includes Cache-Control and ETag headers. Clients
        can send If-None-Match to receive 304 Not Modified.
      parameters:
        - name: asset_type
          in: path
          required: true
          description: The type of item (lowercase).
          schema:
            $ref: "#/components/schemas/ItemType"
        - name: item_id
          in: path
          required: true
          description: Unique identifier of the item.
          schema:
            type: string
            format: uuid
        - name: If-None-Match
          in: header
          required: false
          description: >
            ETag value from a previous response. If the thumbnail has not
            changed, the server responds with 304 Not Modified.
          schema:
            type: string
      responses:
        "200":
          description: Thumbnail image content.
          headers:
            Cache-Control:
              schema:
                type: string
                example: "public, max-age=31536000, immutable"
            ETag:
              schema:
                type: string
                example: "\"a3f5b2c1d4e6789012345678abcdef01\""
          content:
            image/webp:
              schema:
                type: string
                format: binary
        "304":
          description: >
            Not Modified – the client's cached version is still current.
        "404":
          description: Item or thumbnail not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    head:
      operationId: headThumbnail
      summary: Check thumbnail metadata without downloading
      tags:
        - storage
      description: >
        Returns the same headers as GET (Content-Type, Content-Length,
        Cache-Control, ETag) but without the response body. Useful for
        cache validation and existence checks.
      parameters:
        - name: asset_type
          in: path
          required: true
          description: The type of item (lowercase).
          schema:
            $ref: "#/components/schemas/ItemType"
        - name: item_id
          in: path
          required: true
          description: Unique identifier of the item.
          schema:
            type: string
            format: uuid
        - name: If-None-Match
          in: header
          required: false
          description: >
            ETag value from a previous response. If the thumbnail has not
            changed, the server responds with 304 Not Modified.
          schema:
            type: string
      responses:
        "200":
          description: Thumbnail metadata headers (no body).
          headers:
            Cache-Control:
              schema:
                type: string
                example: "public, max-age=31536000, immutable"
            ETag:
              schema:
                type: string
                example: "\"a3f5b2c1d4e6789012345678abcdef01\""
            Content-Type:
              schema:
                type: string
                example: "image/webp"
            Content-Length:
              schema:
                type: integer
                example: 32768
        "304":
          description: >
            Not Modified – the client's cached version is still current.
        "404":
          description: Item or thumbnail not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/{asset_type}/{item_id}/bundle:
    get:
      operationId: downloadBundle
      summary: Download all variants of a group as a ZIP archive
      tags:
        - storage
      description: >
        Streams a ZIP archive containing all variant files of the group
        identified by item_id (treated as a group_id). The internal folder
        structure is /<group_value>/<original_filename>.
      parameters:
        - name: asset_type
          in: path
          required: true
          description: The type of item (lowercase).
          schema:
            $ref: "#/components/schemas/ItemType"
        - name: item_id
          in: path
          required: true
          description: Group identifier.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: ZIP archive containing all variant files.
          content:
            application/zip:
              schema:
                type: string
                format: binary
        "404":
          description: Group not found or has no items.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/download/bundle:
    post:
      operationId: downloadMultiBundle
      summary: Download multiple asset groups as a single ZIP archive
      tags:
        - storage
      description: >
        Accepts a JSON body with an array of group IDs and streams a ZIP archive
        containing all files of the requested groups. The internal folder
        structure is /<asset_type>/<group_name>/<group_value>/<original_filename>
        for resolution-based types, and /<asset_type>/<group_name>/<original_filename>
        for maps.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MultiBundleRequest"
      responses:
        "200":
          description: ZIP archive containing all files of the requested groups.
          content:
            application/zip:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid request – empty or oversized group_ids array.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: None of the requested groups were found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/map/{item_id}/extract:
    get:
      operationId: extractMapImages
      summary: Extract all embedded images from a map file
      tags:
        - storage
      description: >
        Parses the stored map file and streams a ZIP archive containing all
        embedded images as PNG files.
      parameters:
        - name: item_id
          in: path
          required: true
          description: Unique identifier of the map item.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: ZIP archive containing extracted PNG images.
          content:
            application/zip:
              schema:
                type: string
                format: binary
        "404":
          description: Map not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/upload/{asset_type}:
    post:
      operationId: uploadItem
      summary: Upload a new item with metadata
      tags:
        - storage
      description: >
        Accepts a multipart/form-data request. The first part must be named
        "metadata" (application/json) and the second part must be named "file"
        (the raw file bytes). Returns the assigned item_id on success.
      parameters:
        - name: asset_type
          in: path
          required: true
          description: The type of item (lowercase).
          schema:
            $ref: "#/components/schemas/ItemType"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [metadata, file]
              properties:
                metadata:
                  $ref: "#/components/schemas/ItemMetadata"
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Item created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "400":
          description: Bad request – invalid metadata or missing file part.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden – uploads are restricted to administrators.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Item or checksum already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded – too many new asset groups created from this IP within the configured window.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "507":
          description: Insufficient storage – upload would exceed the configured limit.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    ItemType:
      type: string
      enum:
        - map
        - gameskin
        - hud
        - skin
        - entity
        - theme
        - template
        - emoticon

    License:
      type: string
      description: |
        Content license. Supported values:
        - cc0          – Creative Commons Zero (public domain dedication)
        - cc-by        – CC Attribution
        - cc-by-sa     – CC Attribution-ShareAlike
        - cc-by-nd     – CC Attribution-NoDerivs
        - cc-by-nc     – CC Attribution-NonCommercial
        - cc-by-nc-sa  – CC Attribution-NonCommercial-ShareAlike
        - cc-by-nc-nd  – CC Attribution-NonCommercial-NoDerivs
        - gpl-2        – GNU General Public License v2
        - gpl-3        – GNU General Public License v3
        - mit          – MIT License
        - apache-2     – Apache License 2.0
        - zlib         – zlib License
        - unknown      – License not specified
      enum:
        - cc0
        - cc-by
        - cc-by-sa
        - cc-by-nd
        - cc-by-nc
        - cc-by-nc-sa
        - cc-by-nc-nd
        - gpl-2
        - gpl-3
        - mit
        - apache-2
        - zlib
        - unknown

    ItemMetadata:
      type: object
      required: [name, license, creators]
      properties:
        name:
          type: string
          minLength: 1
          description: Human-readable name of the item.
        creators:
          type: array
          items:
            type: string
          description: List of creator names.
        license:
          $ref: "#/components/schemas/License"

    UploadResponse:
      type: object
      required: [item_id]
      properties:
        item_id:
          type: string
          format: uuid
          description: Server-assigned identifier of the newly created item.

    SearchResult:
      type: object
      required: [item_id, asset_type, score, item_value]
      properties:
        item_id:
          type: string
          format: uuid
          description: Unique identifier of the item.
        asset_type:
          $ref: "#/components/schemas/ItemType"
        score:
          type: number
          format: double
          description: Relevance score (higher is better).
        item_value:
          type: object
          description: Arbitrary JSON payload of the item.
          additionalProperties: true

    SearchResponse:
      type: object
      required: [results, total]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResult"
        total:
          type: integer
          description: Total number of results before pagination.

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message.

    ConfigResponse:
      type: object
      required: [items_per_page]
      properties:
        items_per_page:
          type: integer
          description: Maximum number of items returned per page.

    ItemTypesResponse:
      type: object
      required: [asset_types]
      properties:
        asset_types:
          type: array
          items:
            $ref: "#/components/schemas/ItemType"
          description: All available item types.

    ListItemsResponse:
      type: object
      required: [results, total]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/ListItem"
        total:
          type: integer
          description: Total number of results before pagination.

    ListItem:
      type: object
      required: [item_id, asset_type, item_value]
      properties:
        item_id:
          type: string
          format: uuid
          description: Unique identifier of the item.
        asset_type:
          $ref: "#/components/schemas/ItemType"
        item_value:
          type: object
          description: Arbitrary JSON payload of the item.
          additionalProperties: true

    SortField:
      type: string
      description: Field to sort results by.
      enum:
        - name
        - creators
        - license
        - size
        - created_at
      default: name
      x-enum-varnames:
        - SortName
        - SortCreators
        - SortLicense
        - SortSize
        - SortCreatedAt

    SortOrder:
      type: string
      description: Sort direction.
      enum:
        - asc
        - desc
      default: asc

    MultiBundleRequest:
      type: object
      required: [group_ids]
      properties:
        group_ids:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
          maxItems: 100
          description: List of asset group IDs to include in the ZIP archive.
