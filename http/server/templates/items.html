<table class="items-table">
  {{if .Items}}
    {{range .Items}}
    <tr data-type="{{.ItemType}}">
      <td class="col-thumb">
        {{if .HasThumbnail}}
        <img src="/api/{{.ItemType}}/{{.ItemID}}/thumbnail" alt="{{.Name}}" loading="lazy" onclick="openPreview(this.src)">
        {{else}}
        <div class="thumb-placeholder">{{.ItemType}}</div>
        {{end}}
      </td>
      <td class="col-name">{{.Name}}</td>
      <td class="col-creator">{{.Creators}}</td>
      <td class="col-actions">
        <a href="/api/{{.ItemType}}/{{.ItemID}}/download" title="Download">Download</a>
        {{if eq .ItemType "map"}}<a href="/api/map/{{.ItemID}}/extract" title="Extract embedded images as ZIP">Images</a>{{end}}
      </td>
    </tr>
    {{end}}
  {{else}}
    <tr><td colspan="4" class="empty-state">No items found.</td></tr>
  {{end}}
</table>

{{if .Items}}
<div class="pagination">
  <button hx-get="{{.PrevURL}}" hx-target="#content" {{if le .Offset 0}}disabled{{end}}>&laquo; Prev</button>
  <span class="page-info">{{.PageStart}}&ndash;{{.PageEnd}} of {{.Total}}</span>
  <button hx-get="{{.NextURL}}" hx-target="#content" {{if ge .PageEnd .Total}}disabled{{end}}>Next &raquo;</button>
</div>
{{end}}
