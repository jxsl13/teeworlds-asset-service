<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teeworlds Assets</title>
  <script src="/static/htmx.min.js"></script>
  <style>
    :root {
      --bg-dark:    #1a1a2e;
      --bg-mid:     #16213e;
      --bg-card:    #0f3460;
      --accent:     #e94560;
      --accent-dim: #c23152;
      --text:       #eee;
      --text-dim:   #94a3b8;
      --border:     #233554;
      --success:    #10b981;
      --radius:     6px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, var(--bg-mid), #0a0a1a);
      border-bottom: 2px solid var(--accent);
      padding: 1rem 0;
      text-align: center;
    }
    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .header h1 span { color: var(--accent); }
    .header .subtitle {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-top: 0.2rem;
    }

    .container { max-width: 1280px; margin: 0 auto; padding: 0 1rem; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .tabs {
      display: flex;
      gap: 2px;
      flex-wrap: wrap;
      flex: 1;
    }
    .tab {
      padding: 0.4rem 0.8rem;
      cursor: pointer;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-dim);
      font-size: 0.8rem;
      font-weight: 500;
      border-radius: var(--radius);
      transition: all .15s;
      text-transform: capitalize;
    }
    .tab:hover { background: rgba(233,69,96,0.1); color: var(--text); }
    .tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .search-box { position: relative; flex-shrink: 0; }
    .search-box input {
      width: 200px;
      padding: 0.4rem 0.7rem 0.4rem 1.8rem;
      background: var(--bg-mid);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.8rem;
    }
    .search-box input::placeholder { color: var(--text-dim); }
    .search-box input:focus { outline: none; border-color: var(--accent); }
    .search-box::before {
      content: '\1F50D';
      position: absolute;
      left: 0.5rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.75rem;
      pointer-events: none;
    }

    .btn-upload {
      padding: 0.4rem 0.9rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }
    .btn-upload:hover { background: var(--accent-dim); }

    /* ── Content ── */
    #content { min-height: 300px; padding: 1rem 0; }

    /* ── Grid ── */
    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.75rem;
    }
    .item-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform .15s, border-color .15s;
    }
    .item-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
    }
    .item-card .thumb {
      width: 100%;
      aspect-ratio: 1;
      object-fit: contain;
      background: #0a0a1a;
      display: block;
      image-rendering: pixelated;
    }
    .item-card .thumb-placeholder {
      width: 100%;
      aspect-ratio: 1;
      background: #0a0a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .item-card .info {
      padding: 0.4rem 0.5rem;
      background: rgba(0,0,0,0.3);
    }
    .item-card .name {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-card .meta {
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-top: 0.1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-card .actions {
      display: flex;
      gap: 0.3rem;
      margin-top: 0.3rem;
    }
    .item-card .actions a {
      font-size: 0.65rem;
      color: var(--accent);
      text-decoration: none;
      padding: 0.15rem 0.4rem;
      border: 1px solid var(--accent);
      border-radius: 3px;
      transition: all .15s;
    }
    .item-card .actions a:hover {
      background: var(--accent);
      color: #fff;
    }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem 0;
    }
    .pagination button {
      padding: 0.35rem 0.7rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      cursor: pointer;
      font-size: 0.8rem;
      transition: border-color .15s;
    }
    .pagination button:disabled { opacity: 0.3; cursor: default; }
    .pagination button:hover:not(:disabled) { border-color: var(--accent); }
    .pagination .page-info { font-size: 0.8rem; color: var(--text-dim); }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    /* ── Upload Modal ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--bg-mid);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      width: 90%;
      max-width: 440px;
      position: relative;
    }
    .modal h2 {
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    .modal h2 span { color: var(--accent); text-transform: capitalize; }
    .modal-close {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 1.2rem;
      cursor: pointer;
    }
    .modal-close:hover { color: var(--text); }
    .form-group { margin-bottom: 0.75rem; }
    .form-group label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-bottom: 0.25rem;
      font-weight: 500;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 0.4rem 0.6rem;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.8rem;
    }
    .form-group input:focus,
    .form-group select:focus { outline: none; border-color: var(--accent); }
    .form-group input[type="file"] { padding: 0.3rem; }
    .form-group input[type="file"]::file-selector-button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.3rem 0.6rem;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.75rem;
      margin-right: 0.5rem;
    }
    .form-hint {
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-top: 0.15rem;
    }
    .btn-submit {
      width: 100%;
      padding: 0.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background .15s;
    }
    .btn-submit:hover { background: var(--accent-dim); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .upload-status {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      text-align: center;
      min-height: 1.2em;
    }
    .upload-status.error { color: var(--accent); }
    .upload-status.success { color: var(--success); }

    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }
    .spinner { color: var(--accent); font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Teeworlds <span>Assets</span></h1>
    <div class="subtitle">Community asset database &mdash; skins, maps, gameskins &amp; more</div>
  </div>

  <div class="container">
    <div class="toolbar">
      <div class="tabs" id="tabs">
        {{range $i, $t := .ItemTypes}}
        <button class="tab{{if eq $t $.ActiveType}} active{{end}}"
                data-type="{{$t}}"
                hx-get="/{{$t}}"
                hx-target="#content"
                onclick="switchTab(this)">
          {{$t}}
        </button>
        {{end}}
      </div>

      <div class="search-box">
        <input type="search" id="search" name="q" placeholder="Search&hellip;"
               hx-get="/{{.ActiveType}}"
               hx-trigger="input changed delay:300ms, search"
               hx-target="#content"
               hx-include="this"
               autocomplete="off"
               value="{{.Query}}">
      </div>

      <button class="btn-upload" onclick="openUpload()">&#x2B; Upload</button>
    </div>

    <div id="content" hx-get="/{{.ActiveType}}{{if .Query}}?q={{.Query}}{{end}}" hx-trigger="load" hx-swap="innerHTML">
      <span class="htmx-indicator spinner">Loading&hellip;</span>
    </div>
  </div>

  <!-- Upload Modal -->
  <div class="modal-backdrop" id="uploadModal">
    <div class="modal">
      <button class="modal-close" onclick="closeUpload()">&times;</button>
      <h2>Upload <span id="uploadTypeLabel">{{.ActiveType}}</span></h2>
      <form id="uploadForm" onsubmit="return submitUpload(event)">
        <div class="form-group">
          <label for="upload-name">Name</label>
          <input type="text" id="upload-name" required placeholder="e.g. my_cool_skin">
        </div>
        <div class="form-group">
          <label for="upload-creators">Creators</label>
          <input type="text" id="upload-creators" required placeholder="e.g. player1, player2">
          <div class="form-hint">Comma-separated list of creator names</div>
        </div>
        <div class="form-group">
          <label for="upload-license">License</label>
          <select id="upload-license">
            <option value="cc-by">CC Attribution</option>
            <option value="cc-by-sa">CC Attribution-ShareAlike</option>
            <option value="cc0">CC Zero (Public Domain)</option>
            <option value="cc-by-nc">CC Attribution-NonCommercial</option>
            <option value="cc-by-nc-sa">CC Attr-NonComm-ShareAlike</option>
            <option value="cc-by-nd">CC Attribution-NoDerivs</option>
            <option value="cc-by-nc-nd">CC Attr-NonComm-NoDerivs</option>
            <option value="gpl-2">GPL v2</option>
            <option value="gpl-3">GPL v3</option>
            <option value="mit">MIT</option>
            <option value="custom">Custom / Other</option>
            <option value="unknown">Unknown</option>
          </select>
        </div>
        <div class="form-group">
          <label for="upload-file">File</label>
          <input type="file" id="upload-file" required>
        </div>
        <button type="submit" class="btn-submit" id="uploadSubmitBtn">Upload</button>
        <div class="upload-status" id="uploadStatus"></div>
      </form>
    </div>
  </div>

  <script>
    let activeType = '{{.ActiveType}}';

    function switchTab(btn) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      activeType = btn.dataset.type;
      const search = document.getElementById('search');
      search.setAttribute('hx-get', '/' + activeType);
      search.value = '';
      htmx.process(search);
      document.getElementById('uploadTypeLabel').textContent = activeType;
    }

    function openUpload() {
      document.getElementById('uploadTypeLabel').textContent = activeType;
      document.getElementById('uploadForm').reset();
      const st = document.getElementById('uploadStatus');
      st.textContent = '';
      st.className = 'upload-status';
      document.getElementById('uploadSubmitBtn').disabled = false;
      document.getElementById('uploadModal').classList.add('open');
    }

    function closeUpload() {
      document.getElementById('uploadModal').classList.remove('open');
    }

    document.getElementById('uploadModal').addEventListener('click', function(e) {
      if (e.target === this) closeUpload();
    });

    function submitUpload(e) {
      e.preventDefault();
      var status = document.getElementById('uploadStatus');
      var submitBtn = document.getElementById('uploadSubmitBtn');
      var name = document.getElementById('upload-name').value.trim();
      var creatorsRaw = document.getElementById('upload-creators').value.trim();
      var license = document.getElementById('upload-license').value;
      var fileInput = document.getElementById('upload-file');

      if (!name || !creatorsRaw || !fileInput.files.length) {
        status.textContent = 'Please fill in all fields.';
        status.className = 'upload-status error';
        return false;
      }

      var creators = creatorsRaw.split(',').map(function(s){ return s.trim(); }).filter(Boolean);
      var metadata = JSON.stringify({ name: name, creators: creators, license: license });
      var formData = new FormData();
      formData.append('metadata', new Blob([metadata], { type: 'application/json' }));
      formData.append('file', fileInput.files[0]);

      submitBtn.disabled = true;
      status.textContent = 'Uploading\u2026';
      status.className = 'upload-status';

      fetch('/api/upload/' + encodeURIComponent(activeType), {
        method: 'POST',
        body: formData
      })
      .then(function(resp) {
        return resp.json().then(function(body) {
          if (!resp.ok) throw new Error(body.error || 'Upload failed');
          status.textContent = 'Uploaded successfully!';
          status.className = 'upload-status success';
          htmx.ajax('GET', '/' + activeType, '#content');
          setTimeout(closeUpload, 1200);
        });
      })
      .catch(function(err) {
        status.textContent = err.message;
        status.className = 'upload-status error';
        submitBtn.disabled = false;
      });

      return false;
    }
  </script>
</body>
</html>
