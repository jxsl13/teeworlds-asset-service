version: "2"
sql:
  - engine: "postgresql"
    queries: [
      "queries/search.sql",
      "queries/insert.sql",
      "queries/get.sql",
      "queries/list.sql",
      "queries/admin.sql",
    ]
    schema: [
      "migrations/001_schema.up.sql",
      "migrations/002_storage_stats.up.sql",
    ]
    gen:
      go:
        sql_package: "pgx/v5"
        package: "sql"
        out: "."
        overrides: []
        output_db_file_name: "db.gen.go"
        output_models_file_name: "models.gen.go"

        emit_db_tags: true
        emit_prepared_queries: false
        emit_empty_slices: true
        emit_enum_valid_method: true
        emit_pointers_for_null_types: true
        emit_all_enum_values: true